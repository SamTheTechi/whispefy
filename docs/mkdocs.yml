site_name: Whispefy
site_description: Linux voice dictation for Hyprland with Groq and LangChain
docs_dir: .
site_dir: ../site

theme:
  name: material
  logo: assets/logo.svg
  favicon: assets/logo.svg
  font:
    text: Inter
    code: JetBrains Mono
  features:
    - navigation.tabs
    - navigation.sections
    - navigation.top
    - content.code.copy
    - content.action.view
  palette:
    - scheme: default
      primary: black
      accent: teal

extra_css:
  - stylesheets/extra.css

nav:
  - Home: index.md
  - Getting Started: getting-started.md
  - Architecture: architecture.md

plugins:
  - search

markdown_extensions:
  - admonition
  - tables
  - pymdownx.superfences
