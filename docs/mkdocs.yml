site_name: Whispefy
site_description: Linux voice dictation for Hyprland with Groq and LangChain
repo_name: Whispefy
repo_url: https://github.com/SamTheTechi/whispefy
docs_dir: .
site_dir: ../site

theme:
  name: material
  logo: assets/logo.svg
  favicon: assets/logo.svg
  font:
    text: Nunito
    code: JetBrains Mono
  features:
    - navigation.instant
    - navigation.tabs
    - navigation.sections
    - navigation.top
    - toc.follow
    - search.suggest
    - search.highlight
    - content.code.copy
  palette:
    - scheme: default
      primary: custom
      accent: custom

extra_css:
  - stylesheets/extra.css

nav:
  - Home: index.md
  - Installation: getting-started.md
  - Architecture: architecture.md

plugins:
  - search

markdown_extensions:
  - admonition
  - tables
  - pymdownx.superfences
